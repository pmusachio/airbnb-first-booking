[project]
name = "Airbnb Predict First Booking"
slug = "01_airbnb_first_booking"
family = "airbnb"
problem_type = "multiclass_classification"
business_goal = "Prever o primeiro destino de reserva de novos usuarios e gerar submissao top-N no formato Kaggle."
primary_metric = "NDCG@5, macro F1 e acuracia balanceada"

[data]
train_file = "data/raw/train_users_2.csv"
test_file = "data/raw/test_users.csv"
sample_submission_file = "data/raw/sample_submission_NDF.csv"
target = "country_destination"
id_columns = ["id"]
drop_columns = ["date_first_booking"]

[modeling]
class_weight = "balanced"
test_size = 0.2
random_state = 42
max_iter = 1200
model_file = "models/model.joblib"

[evaluation]
top_k = []
ndcg_k = [5]
